name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      pages-ready: ${{ steps.pages-status.outputs.ready }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests if available
        run: npm test --if-present

      - name: Build project
        run: npm run build
        env:
          VITE_BASE_PATH: /quicknote/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: quicknote-dist
          path: dist
          if-no-files-found: error

      - name: Check GitHub Pages configuration
        id: pages-status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          status_code="$(curl \
            --silent \
            --output pages.json \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages")"

          if [ "${status_code}" != "200" ]; then
            echo "::warning::GitHub Pages is not enabled for this repository yet. CI will pass, but deployment is skipped until Pages is set to use GitHub Actions."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          build_type="$(python - <<'PY'
          import json

          with open("pages.json", encoding="utf-8") as pages_file:
              print(json.load(pages_file).get("build_type", ""))
          PY
          )"

          if [ "${build_type}" != "workflow" ]; then
            echo "::warning::GitHub Pages is enabled, but it is not configured to deploy from GitHub Actions. CI will pass and deployment is skipped."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "ready=true" >> "${GITHUB_OUTPUT}"

      - name: Configure GitHub Pages
        if: steps.pages-status.outputs.ready == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: steps.pages-status.outputs.ready == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.build.outputs.pages-ready == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy static site
        id: deployment
        uses: actions/deploy-pages@v5
